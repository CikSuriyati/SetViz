<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SetViz Basic Concepts — Learn Set Theory Fundamentals</title>
  <meta name="description" content="Learn basic set theory concepts step by step. Understand sets, symbols, and relationships visually.">
  <link rel="stylesheet" href="style.css" />
  <style>
    .concept-page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    .stage-header {
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      text-align: center;
    }
    .stage-title {
      font-size: 24px;
      font-weight: bold;
      margin: 0 0 8px 0;
    }
    .stage-description {
      font-size: 16px;
      opacity: 0.9;
      margin: 0;
    }
    .symbol-display {
      background: #f8fafc;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      padding: 16px;
      margin: 16px 0;
      text-align: center;
      font-size: 18px;
      font-weight: 600;
    }
    .operation-buttons {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 8px;
      margin: 16px 0;
    }
    .op-btn {
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      background: white;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    .op-btn:hover {
      border-color: #3b82f6;
      background: #eff6ff;
    }
    .op-btn.active {
      border-color: #3b82f6;
      background: #3b82f6;
      color: white;
    }
    .teaching-point {
      background: #f0f9ff;
      border-left: 4px solid #0ea5e9;
      padding: 12px 16px;
      margin: 12px 0;
      border-radius: 0 8px 8px 0;
    }
    .venn-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 400px;
      background: #f8fafc;
      border-radius: 12px;
      margin: 20px 0;
    }
    .stage-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 20px 0;
    }
    .stage-nav {
      display: flex;
      gap: 12px;
    }
    .nav-btn {
      padding: 10px 20px;
      border: 2px solid #e2e8f0;
      background: white;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    .nav-btn:hover:not(:disabled) {
      border-color: #3b82f6;
      background: #eff6ff;
    }
    .nav-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .nav-btn.primary {
      background: #3b82f6;
      color: white;
      border-color: #3b82f6;
    }
  </style>
</head>
<body>
  <div class="concept-page">
    <header class="stage-header">
      <h1 class="stage-title" id="stageTitle">Stage 1: One Set (A)</h1>
      <p class="stage-description" id="stageDescription">Learn what a set is and understand the basic concept of set A</p>
    </header>

    <div class="symbol-display" id="symbolDisplay">
      A = { }
    </div>

    <div class="operation-buttons" id="operationButtons">
      <button class="op-btn" data-operation="A">A</button>
      <button class="op-btn" data-operation="A-complement">A′</button>
    </div>

    <div class="teaching-point" id="teachingPoint">
      <strong>Teaching Point:</strong> This is set A — all elements belonging to A. A′ (complement of A) represents everything outside A.
    </div>

    <div class="venn-container">
      <svg id="venn" viewBox="0 0 500 320" width="100%" aria-label="Venn diagram">
        <defs>
          <circle id="circleA" cx="190" cy="160" r="100"/>
          <circle id="circleB" cx="310" cy="160" r="100"/>
          
          <clipPath id="clipA"><use href="#circleA"/></clipPath>
          <clipPath id="clipB"><use href="#circleB"/></clipPath>
          <clipPath id="clipAB">
            <use href="#circleA"/>
            <use href="#circleB" clip-path="url(#clipA)"/>
          </clipPath>
          <clipPath id="clipAminusB">
            <use href="#circleA"/>
            <rect x="0" y="0" width="500" height="320" clip-path="url(#clipB)" fill="#000"/>
          </clipPath>
          <clipPath id="clipBminusA">
            <use href="#circleB"/>
            <rect x="0" y="0" width="500" height="320" clip-path="url(#clipA)" fill="#000"/>
          </clipPath>
          <mask id="maskComplement">
            <rect x="0" y="0" width="500" height="320" fill="white"/>
            <use href="#circleA" fill="black"/>
            <use href="#circleB" fill="black"/>
          </mask>
        </defs>

        <g id="base">
          <circle cx="190" cy="160" r="100" class="baseA"/>
          <circle cx="310" cy="160" r="100" class="baseB" style="display: none;"/>
        </g>

        <g id="hl-A" opacity="0">
          <circle cx="190" cy="160" r="100" class="hlA"/>
        </g>
        <g id="hl-B" opacity="0">
          <circle cx="310" cy="160" r="100" class="hlB"/>
        </g>
        <g id="hl-A-complement" opacity="0" mask="url(#maskComplement)">
          <rect x="0" y="0" width="500" height="320" class="hlComp"/>
        </g>
        <g id="hl-B-complement" opacity="0" mask="url(#maskComplement)">
          <rect x="0" y="0" width="500" height="320" class="hlComp"/>
        </g>
        <g id="hl-A-union-B" opacity="0">
          <circle cx="190" cy="160" r="100" class="hlA"/>
          <circle cx="310" cy="160" r="100" class="hlB"/>
        </g>
        <g id="hl-A-intersection-B" opacity="0" clip-path="url(#clipAB)">
          <rect x="0" y="0" width="500" height="320" class="hlAB"/>
        </g>

        <g id="regionA"></g>
        <g id="regionAB"></g>
        <g id="regionB"></g>
        <g id="regionOut"></g>

        <text x="190" y="60" font-size="20" text-anchor="middle">A</text>
        <text x="310" y="60" font-size="20" text-anchor="middle" style="display: none;">B</text>
        <rect x="30" y="20" width="440" height="280" class="uBox"/>
        <text x="40" y="36" font-size="12">U</text>
      </svg>
    </div>

    <div class="stage-controls">
      <div class="stage-nav">
        <button class="nav-btn" id="prevStageBtn" disabled>← Previous Stage</button>
        <button class="nav-btn" id="nextStageBtn">Next Stage →</button>
      </div>
      <div>
        <button class="nav-btn" id="resetBtn">Reset</button>
        <a href="index.html" class="nav-btn">Back to Main</a>
      </div>
    </div>
  </div>

  <script>
    // Basic Concepts Page Script
    let currentStage = 1;
    let currentOperation = null;
    let setRelationship = 'independent';

    const stages = {
      1: {
        title: 'Stage 1: One Set (A)',
        description: 'Learn what a set is and understand the basic concept of set A',
        operations: ['A', 'A-complement'],
        teachingPoint: 'This is set A — all elements belonging to A. A′ (complement of A) represents everything outside A.',
        showRelationshipToggle: false
      },
      2: {
        title: 'Stage 2: Two Sets (A and B, Independent)',
        description: 'Show relationship between two separate sets',
        operations: ['A', 'B', 'A-complement', 'B-complement', 'A-union-B', 'A-intersection-B'],
        teachingPoint: 'Union (∪) = all in A or B. Intersection (∩) = none (because independent). Complements = outside the respective set.',
        showRelationshipToggle: true
      },
      3: {
        title: 'Stage 3: Set Relationships',
        description: 'Explore different relationships between sets',
        operations: ['A', 'B', 'A-complement', 'B-complement', 'A-union-B', 'A-intersection-B'],
        teachingPoint: 'Independent → Circles far apart. Overlapping → Circles intersect. Mutually exclusive → No shared elements (A ∩ B = ∅).',
        showRelationshipToggle: true
      }
    };

    function updateStage() {
      const stage = stages[currentStage];
      document.getElementById('stageTitle').textContent = stage.title;
      document.getElementById('stageDescription').textContent = stage.description;
      document.getElementById('teachingPoint').innerHTML = `<strong>Teaching Point:</strong> ${stage.teachingPoint}`;
      
      // Show/hide relationship toggle
      const relationshipToggle = document.getElementById('relationshipToggle');
      relationshipToggle.style.display = stage.showRelationshipToggle ? 'block' : 'none';
      
      // Update operation buttons
      updateOperationButtons(stage.operations);
      
      // Update Venn diagram
      updateVennDiagram();
      
      // Update navigation buttons
      document.getElementById('prevStageBtn').disabled = currentStage === 1;
      document.getElementById('nextStageBtn').disabled = currentStage === 3;
    }

    function updateOperationButtons(operations) {
      const container = document.getElementById('operationButtons');
      container.innerHTML = '';
      
      operations.forEach(op => {
        const btn = document.createElement('button');
        btn.className = 'op-btn';
        btn.setAttribute('data-operation', op);
        btn.textContent = getOperationSymbol(op);
        btn.addEventListener('click', () => selectOperation(op));
        container.appendChild(btn);
      });
    }

    function getOperationSymbol(operation) {
      const symbols = {
        'A': 'A',
        'B': 'B',
        'A-complement': 'A′',
        'B-complement': 'B′',
        'A-union-B': 'A ∪ B',
        'A-intersection-B': 'A ∩ B'
      };
      return symbols[operation] || operation;
    }

    function selectOperation(operation) {
      currentOperation = operation;
      
      // Update button states
      document.querySelectorAll('.op-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.operation === operation);
      });
      
      // Update symbol display
      document.getElementById('symbolDisplay').textContent = getOperationSymbol(operation);
      
      // Update Venn diagram highlighting
      updateVennDiagram();
    }

    function updateVennDiagram() {
      // Reset all highlights
      document.querySelectorAll('[id^="hl-"]').forEach(el => {
        el.setAttribute('opacity', '0');
      });
      
      // Show/hide circles based on stage
      const circleB = document.querySelector('.baseB');
      const textB = document.querySelector('text[style*="display: none"]');
      
      if (currentStage === 1) {
        // Single set mode
        if (circleB) circleB.style.display = 'none';
        if (textB) textB.style.display = 'none';
      } else {
        // Two set mode
        if (circleB) circleB.style.display = 'block';
        if (textB) textB.style.display = 'block';
        
        // Adjust circle positions based on relationship
        if (setRelationship === 'independent') {
          // Circles far apart
          circleB.setAttribute('cx', '350');
        } else if (setRelationship === 'overlapping') {
          // Circles slightly overlapping
          circleB.setAttribute('cx', '310');
        } else if (setRelationship === 'mutually-exclusive') {
          // Circles close but not overlapping
          circleB.setAttribute('cx', '320');
        }
      }
      
      // Apply highlighting based on current operation
      if (currentOperation) {
        const highlightId = `hl-${currentOperation}`;
        const highlightEl = document.getElementById(highlightId);
        if (highlightEl) {
          highlightEl.setAttribute('opacity', '1');
        }
      }
    }

    // Event listeners
    document.getElementById('prevStageBtn').addEventListener('click', () => {
      if (currentStage > 1) {
        currentStage--;
        currentOperation = null;
        updateStage();
      }
    });

    document.getElementById('nextStageBtn').addEventListener('click', () => {
      if (currentStage < 3) {
        currentStage++;
        currentOperation = null;
        updateStage();
      }
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      currentOperation = null;
      updateStage();
    });

    // Relationship toggle
    document.getElementById('relationshipSeg')?.addEventListener('click', (e) => {
      if (e.target.tagName === 'BUTTON') {
        setRelationship = e.target.dataset.relationship;
        document.querySelectorAll('#relationshipSeg button').forEach(btn => {
          btn.setAttribute('aria-pressed', btn === e.target ? 'true' : 'false');
        });
        updateVennDiagram();
      }
    });

    // Initialize
    updateStage();
  </script>
</body>
</html>
